baseURL = "https://czt0630.github.io/blog_infra/"
defaultContentLanguage = "zh"
title = "WSPN 的学习笔记"
theme = "hugo-theme-stack"
paginate = 10

[params]
  mainSections = ["posts"]
  rssFullContent = true
  description = "记录 Java、AI/LLM、VR 等技术学习过程"

  [params.footer]
    since = 2026
    customText = "Powered by Hugo & Stack"

  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02"

  [params.sidebar]
    compact = false
    subtitle = "终身学习者 | Java · AI/LLM · VR"
    avatar = "images/avatar.png"
    emoji = "🚀"

  [params.article]
    headingAnchor = true
    math = true
    toc = true
    readingTime = true

    [params.article.list]
      showTags = true
      showCategories = true
      showDate = true
      showAuthor = false
      showSummary = true
      summaryLength = 200

    [params.article.license]
      enabled = true
      default = "CC BY-NC-SA 4.0"

  [params.widgets]
    homepage = [
      {type = "search"},
      {type = "archives"},
      {type = "categories"},
      {type = "tag-cloud"}
    ]
    page = [
      {type = "toc"}
    ]

  [params.colorScheme]
    toggle = true
    default = "auto"

  [params.opengraph]
    [params.opengraph.twitter]
      site = ""
      card = "summary_large_image"

  [params.comments]
    enabled = false

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 10
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    name = "分类"
    url = "/categories/"
    weight = 30
  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 40
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 50

  [[menu.social]]
    name = "GitHub"
    url = "https://github.com/CZT0630"
    weight = 10
    [menu.social.params]
      icon = "brand-github"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "dracula"
    noClasses = true

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
